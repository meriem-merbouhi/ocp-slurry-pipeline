name: OCP Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install fastapi uvicorn pydantic scikit-learn numpy joblib

      - name: Test API imports
        run: python -c "from app.main import app; print('✅ API imports OK')"

      - name: Test schemas Pydantic
        run: |
          python -c "
          from app.schemas import SensorInput, PredictionOutput
          s = SensorInput(
              air_temp_k=298.5,
              process_temp_k=308.7,
              rotation_speed_rpm=1551.0,
              torque_nm=42.8,
              tool_wear_min=108.0,
              station_type='M'
          )
          print('✅ SensorInput OK:', s.air_temp_k)
          "

      - name: Test prediction logic
        run: |
          python -c "
          from app.model import predict_failure
          print('✅ predict_failure importé OK')
          "

      - name: CI Summary
        run: echo "✅ Tous les tests OCP Pipeline passés avec succès"