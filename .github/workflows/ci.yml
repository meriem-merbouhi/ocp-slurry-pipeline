name: OCP Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic scikit-learn numpy joblib

    - name: Test API imports
      run: |
        python -c "from app.main import app; print('✅ API imports OK')"

    - name: Test schemas Pydantic
      run: |
        python -c "
        from app.schemas import SensorData
        data = SensorData(
            air_temp_k=298.0,
            process_temp_k=308.0,
            rotation_speed_rpm=1500,
            torque_nm=40.0,
            tool_wear_min=100
        )
        print('✅ Schema validation OK')
        "

    - name: Test prediction logic
      run: |
        python -c "
        from app.model import predict_failure
        result = predict_failure(
            air_temp_k=298.0,
            process_temp_k=308.0,
            rotation_speed_rpm=1500,
            torque_nm=40.0,
            tool_wear_min=100
        )
        print(f'✅ Prediction OK — result: {result}')
        "

    - name: CI Summary
      run: |
        echo "================================"
        echo "  OCP Pipeline CI — PASSED ✅"
        echo "================================"